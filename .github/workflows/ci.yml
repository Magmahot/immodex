name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Lint + smoke build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate manifest.json
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"

      - name: Syntax check all JS files
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' f; do
            node --check "$f" || { echo "::error file=$f::syntax error"; fail=1; }
          done < <(find src -name "*.js" -print0)
          exit $fail

      - name: Smoke-build extension zip
        run: |
          mkdir -p dist
          zip -r dist/immodex.zip manifest.json LICENSE icons src \
            -x "icons/*.svg" \
            -x "**/.DS_Store"
          ls -la dist/

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: immodex-${{ github.sha }}
          path: dist/immodex.zip
          retention-days: 7

  commitlint:
    name: Conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title is conventional
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            build
            ci
            chore
            test
            style
            revert
          requireScope: false
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.
